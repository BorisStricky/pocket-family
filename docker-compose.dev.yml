version: "3.8"

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile.devcontainer
    image: pocket-family-devcontainer:latest
    user: devuser
    volumes:
      - ./:/workspace:cached
      # Named volume for node_modules to avoid Windows symlink issues
      # This masks the host's node_modules with a container-managed volume
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      - db
    networks:
      - pfin-net
    ports:
      - "5173:5173" # Vite dev server
      - "8000:8000" # FastAPI dev server
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
      - VITE_API_URL=/api
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: sleep infinity
    # Run backend server: cd backend/api && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    # Run frontend server: cd frontend && npm run dev -- --host

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pfinancedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-dev:/var/lib/postgresql/data-dev
    networks:
      - pfin-net

volumes:
  pgdata-dev:
  # Named volume for frontend node_modules — isolates container deps from host
  # Fixes Windows/WSL2 symlink issues when mounting host directories
  frontend_node_modules:

networks:
  pfin-net:
    driver: bridge
