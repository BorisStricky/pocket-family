version: "3.8"

services:
  # devcontainer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.devcontainer
  #   image: pocket-family-devcontainer:latest
  #   user: devuser
  #   volumes:
  #     - ./:/workspace:cached
  #     # Named volume for node_modules to avoid Windows symlink issues
  #     # This masks the host's node_modules with a container-managed volume
  #     - frontend_node_modules:/workspace/frontend/node_modules
  #   depends_on:
  #     - db-dev
  #   networks:
  #     - pfin-net
  #   ports:
  #     - "5173:5173" # Vite dev server
  #     - "8000:8000" # FastAPI dev server
  #   environment:
  #     - CHOKIDAR_USEPOLLING=true
  #     - NODE_ENV=development
  #     - VITE_API_URL=/api
  #   env_file:
  #     - .env
  #   stdin_open: true
  #   tty: true
  #   command: sleep infinity
  #   # Run backend server: cd backend/api && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
  #   # Run frontend server: cd frontend && npm run dev -- --host

  db-dev:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: pfinancedb_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - pfin-dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis — message broker + Celery result backend ─────────────────────────
  # Used locally in place of SQS. The import worker reads tasks from Redis;
  # the backend writes tasks to Redis and reads job status from Redis.
  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pfin-dev-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NOTE: The import worker (Celery) is intentionally NOT containerized in dev.
  # It runs on the host via `uv run celery -A app.celery_app worker`, launched
  # by infrastructure/dev.sh together with the API and the Vite frontend, so
  # all three iterated processes share the same hot-reload / debugger / log
  # ergonomics. Postgres and Redis are the only services that stay in Docker
  # because they are stateful infra you don't iterate on. In production the
  # worker IS containerized — see `import-worker` in docker-compose.yaml.

volumes:
  pgdata-dev:

networks:
  pfin-dev-net:
    driver: bridge
