# docker-compose.yml (v3.8) — Production configuration
#
# Builds and runs all three services (database, backend, frontend) as
# self-contained Docker images suitable for a local-network deployment.
#
# Required secrets (copy .env.production.example → .env.production and fill in):
#   DB_PASSWORD  — Postgres password
#   JWT_SECRET   — Secret key for signing JWT tokens
#
# Usage:
#   docker-compose --env-file .env.production up --build
version: "3.8"

services:

  # ── PostgreSQL database ─────────────────────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: pfinancedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pfin-net
    # Healthcheck so the backend waits until Postgres is actually
    # accepting connections (not just the container started).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Restrict this container to CPU cores 0–1 and cap it at 0.5 CPU / 512 MB RAM
    # so the database cannot monopolise host resources.
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    image: pocket-family-backend:latest
    restart: unless-stopped
    environment:
      # Database connection — uses the DB_PASSWORD secret
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/pfinancedb
      # JWT signing secret — must be a long random string in production
      JWT_SECRET: ${JWT_SECRET}
      # Disable test mode so refresh tokens are stored as HttpOnly cookies
      TEST_MODE: "0"
      # Cookie Secure flag. "0" lets the refresh_token cookie be sent over
      # plain HTTP (LAN / Tailscale). Production HTTPS deployments must omit
      # this (or set "1") so the cookie is HTTPS-only.
      COOKIE_SECURE: "0"
      # Comma-separated list of origins the browser is allowed to call from.
      # Points to the frontend on the local network.
      CORS_ORIGINS: "http://192.168.1.101:3000"
      # Import service queue and storage configuration
      BROKER_URL: "redis://redis:6379/0"
      RESULT_BACKEND: "redis://redis:6379/1"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_UPLOAD_DIR: "/uploads"
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - csv-uploads:/uploads
    depends_on:
      db:
        # Use the healthcheck condition so the backend only starts
        # once Postgres is ready to accept connections.
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - pfin-net
    # NOTE: No source-code volume mount here. In production the image must be
    # self-contained. The dev setup used ./backend/api/:/app for hot-reload,
    # which would overwrite the built image contents at runtime.
    # Restrict this container to CPU cores 0–1 and cap it at 0.5 CPU / 512 MB RAM.
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Redis — message broker + Celery result backend ─────────────────────────
  # SQS can replace Redis in production by changing BROKER_URL to sqs://
  # in the backend and import-worker services. No code changes needed.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - pfin-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── CSV Import Worker ──────────────────────────────────────────────────────
  import-worker:
    build:
      context: ./import-service
      dockerfile: Dockerfile
    image: pocket-family-import-worker:latest
    restart: unless-stopped
    environment:
      BROKER_URL: "redis://redis:6379/0"
      RESULT_BACKEND: "redis://redis:6379/1"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_UPLOAD_DIR: "/uploads"
      DATABASE_URL: "postgresql+psycopg2://postgres:${DB_PASSWORD}@db:5432/pfinancedb"
      # AWS S3 settings (used when STORAGE_BACKEND=s3)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - csv-uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - pfin-net
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── React frontend (served by nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is baked into the JS bundle at build time by Vite.
        # It cannot be injected at runtime via environment: because nginx
        # only serves static files — it does not run Node.
        VITE_API_URL: "/api"
    image: pocket-family-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"   # host:container (nginx serves on 80)
    depends_on:
      - backend
    networks:
      - pfin-net
    # Restrict this container to CPU cores 0–1 and cap it at 0.5 CPU / 512 MB RAM.
    cpuset: "0,1"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
  # Shared volume between backend (write) and import-worker (read/delete)
  # Replace with S3 bucket in production by setting STORAGE_BACKEND=s3
  csv-uploads:

networks:
  pfin-net:
    driver: bridge
