server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to the backend service on the Docker network.
  # The /api/ prefix is stripped so that /api/auth/login → backend:8000/auth/login.
  # This keeps all browser traffic same-origin, which is required for HttpOnly
  # cookies (refresh_token with SameSite=lax) to be sent on fetch requests.
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
